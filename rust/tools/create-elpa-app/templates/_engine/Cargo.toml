# The vendored Elpa engine — a self-contained Cargo workspace of the five core
# crates (the VM, protocol, renderer, runtime and the unified `elpa` instance).
# The application crate (../app, or ../rust for the Flutter bridge) path-depends
# into `elpa` here; this file owns the shared dependency versions those crates
# inherit with `workspace = true`.
#
# Generated by create-elpa-app for "__APP_TITLE__".
[workspace]
resolver = "2"
members = [
    "elpian-vm",
    "elpa-protocol",
    "elpa-renderer",
    "elpa-runtime",
    "elpa",
]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
once_cell = "1.19"
# `runtime-rng` (an ahash default) pulls `getrandom`, whose wasm32-unknown-unknown
# backend needs extra build configuration. These maps are internal and never
# exposed to adversarial key streams, so disable it and use ahash's fixed
# compile-time seeds, which also drops the getrandom dependency entirely.
ahash = { version = "0.8", default-features = false, features = ["std", "compile-time-rng"] }
xxhash-rust = { version = "0.8", features = ["xxh3"] }

# Shared release profile: small, fast binaries on native and a compact wasm
# module on the web.
[profile.release]
lto = true
codegen-units = 1
opt-level = 3
