name: Build bytecode assets

# The example apps are authored in JavaScript but shipped to the deployed web /
# native examples as **prebuilt VM bytecode** (the JS->AST->bytecode compiler
# phase runs at build time, not at app startup). This workflow keeps the
# committed `examples/material/assets/*.bc` in lock-step with the Material SDK /
# app JavaScript: whenever that JS (or the generator/compiler) changes on a
# pushed branch, it recompiles the bytecode and commits the result back.
#
# The Pages and APK workflows also regenerate the bytecode just before they
# build, so a deploy is always fresh even if this commit-back has not run yet;
# this job exists so the checked-in assets a local build embeds never drift.

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "examples/material/assets/**.js"
      - "examples/material/src/**"
      - "examples/game3d/assets/**.js"
      - "examples/game3d/src/**"
      - "examples/liquidglass/assets/**.js"
      - "examples/liquidglass/src/**"
      - "examples/websdk/assets/**.js"
      - "examples/websdk/assets/sdk/**.js"
      - "examples/websdk/src/**"
      - "examples/flutter/assets/**.js"
      - "examples/flutter/assets/sdk/**.js"
      - "examples/flutter/src/**"
      - "crates/elpian-vm/**"
      - ".github/workflows/build-bytecode.yml"
  workflow_dispatch:

permissions:
  contents: write # commits the regenerated bytecode back to the branch

concurrency:
  group: build-bytecode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bytecode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Compile the example apps to bytecode
        run: |
          cargo run -p elpa-material --bin build_bytecode
          cargo run -p elpa-game3d --bin build_bytecode
          cargo run -p elpa-liquidglass --bin build_bytecode
          cargo run -p elpa-websdk --bin build_bytecode
          cargo run -p elpa-flutter --bin build_bytecode

      - name: Commit regenerated bytecode
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples/material/assets/*.bc examples/game3d/assets/*.bc examples/liquidglass/assets/*.bc examples/websdk/assets/*.bc examples/flutter/assets/*.bc
          if git diff --cached --quiet; then
            echo "Bytecode unchanged; nothing to commit."
          else
            git commit -m "ci: rebuild example bytecode [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
