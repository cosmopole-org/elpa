name: Build wgpu+Flutter template demo APK

# Builds the **CLI-creatable `wgpu-flutter` template** (the project
# `create-elpa-app init -t wgpu-flutter` scaffolds) into release Android APKs —
# one per ABI via `--split-per-abi` — so the template is exercised end-to-end in
# its *installable* form, not just the bundled `flutter/` demo. The APKs are
# uploaded as workflow artifacts and committed + pushed to the repository root as
# `elpa-flutter-demo-<abi>.apk` (e.g. `elpa-flutter-demo-arm64-v8a.apk`).
#
# Pipeline:
#   1. Build the `create-elpa-app` CLI from this repo (rust/tools/create-elpa-app).
#   2. `create-elpa-app init -t wgpu-flutter` scaffolds a self-contained project
#      into a temp dir (vendors the engine, copies the Flutter shell + SDK, and
#      builds the TypeScript app → assets/app/main.js).
#   3. Build that generated project's APKs.
#
# A plain `flutter create` does NOT add flutter_rust_bridge's cargokit Gradle
# hooks, so this job cross-compiles the Rust bridge crate (the project's `rust/`,
# path-linked to the vendored `engine/`) for the Android ABIs with cargo-ndk and
# drops the .so files into jniLibs, where Gradle bundles them. The release build
# is signed with the default debug key (the Flutter template's release buildType
# falls back to it), which is enough for an installable demo APK without
# committing any signing secrets.
#
# The platform runner folders (`android/`) and the FRB-generated bindings are NOT
# part of the scaffold; they are regenerated on every run, mirroring the manual
# setup documented in the generated project's README.md.
#
# Run it from the GitHub UI (Actions → "Build wgpu+Flutter template demo APK" →
# "Run workflow") or on demand; it also runs on pushes that touch the template,
# the engine, or the Flutter shell it is built from.

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      # The built APK is the wgpu-flutter template built end-to-end, so it
      # depends on the CLI + templates, the vendored engine crates, and the
      # Flutter shell + SDK it copies from.
      - "flutter/**"
      - "rust/crates/**"
      - "rust/tools/create-elpa-app/**"
      - ".github/workflows/flutter-android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write # the job pushes the built APK back to the repo

# One in-flight run per ref; a newer run supersedes an older one.
concurrency:
  group: build-flutter-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep the codegen tool in lock-step with the `flutter_rust_bridge` crate
  # version pinned in flutter/rust/Cargo.lock.
  FRB_VERSION: "2.12.0"
  # The project create-elpa-app scaffolds. Built outside the repo tree so the
  # checkout stays clean (only the built APKs are committed back); APP_NAME is
  # also the Flutter --project-name / pubspec name.
  APP_NAME: wgpu_flutter_demo
  # GEN_DIR (the CLI-scaffolded project, built outside the checkout so it stays
  # clean — only the APKs are committed back) is set in a step below rather than
  # here: it must point at `runner.temp`, and the `runner` context is only
  # available at step scope. It also must avoid a `..` segment, since
  # actions/upload-artifact@v4 rejects glob paths containing `..`.

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      # Check out the branch (not a detached SHA) so we can push the APK back.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # See the note in `env` above: runner.temp is step-scoped, and a `..`-free
      # path keeps actions/upload-artifact@v4 happy when it globs the APKs.
      - name: Configure generated project directory
        run: echo "GEN_DIR=${{ runner.temp }}/wgpu-flutter-app" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install Rust + Android targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      # Cache the CLI workspace (rust/) — its swc-based transpiler dominates the
      # CLI build. The generated project lives outside the checkout and does not
      # exist yet at cache-restore time, so it is not cached here.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # --- Scaffold the wgpu-flutter template via the CLI -------------------
      # Build the CLI and run `init`, which vendors the engine, copies the
      # Flutter shell + SDK, and bundles the TypeScript app → assets/app/main.js.
      - name: Scaffold wgpu-flutter project (create-elpa-app)
        working-directory: rust
        run: |
          rm -rf "${GEN_DIR}"
          cargo run --release -p create-elpa-app -- \
            init "${APP_NAME}" \
            --template wgpu-flutter \
            --dir "${GEN_DIR}" \
            --elpa-root "${GITHUB_WORKSPACE}" \
            --force

      - name: Install flutter_rust_bridge_codegen
        run: cargo install --locked flutter_rust_bridge_codegen --version "${FRB_VERSION}"

      # cargo-ndk cross-compiles the bridge crate with the Android NDK toolchain
      # and lays the resulting .so files out under jniLibs/<abi>/ for us.
      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Activate ffigen
        run: dart pub global activate ffigen

      - name: Build APK
        working-directory: ${{ env.GEN_DIR }}
        run: |
          set -euo pipefail
          # Materialize the Android platform runner (not part of the scaffold).
          flutter create . --platforms=android --project-name "${APP_NAME}"

          # Generate the Dart bindings + rust/src/frb_generated.rs from the
          # #[frb]-annotated Rust under the project's rust/src/api.
          flutter_rust_bridge_codegen generate

          # Enable the generated glue module (committed out as a build artifact).
          sed -i \
            -e 's|^// #\[cfg(feature = "frb")\]$|#[cfg(feature = "frb")]|' \
            -e 's|^// mod frb_generated;$|mod frb_generated;|' \
            rust/src/lib.rs

          flutter pub get

          # Cross-compile the Rust bridge crate for each Android ABI and drop the
          # shared libraries into android/app/src/main/jniLibs/<abi>/, where Gradle
          # bundles them into the APK automatically. This is the step a plain
          # `flutter create` does NOT add (only `flutter_rust_bridge_codegen
          # integrate` adds cargokit's build hooks), so without it no
          # `libelpa_bridge.so` ships and the bridge's `init()` fails at launch —
          # a blank screen. The lib name (`elpa_bridge`) matches the loader stem
          # FRB derives from the crate's lib target.
          #
          # ABIs mirror the default `flutter build apk` fat-APK set (arm64-v8a,
          # armeabi-v7a, x86_64); the `frb_generated.rs` enabled above is compiled
          # in via the default `frb` feature.
          ( cd rust && cargo ndk \
              -t arm64-v8a -t armeabi-v7a -t x86_64 \
              -o ../android/app/src/main/jniLibs \
              build --release )

          # Build one APK per ABI instead of a single fat APK. Outputs:
          #   build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          #   build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          #   build/app/outputs/flutter-apk/app-x86_64-release.apk
          flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elpa-flutter-demo-apks
          path: ${{ env.GEN_DIR }}/build/app/outputs/flutter-apk/app-*-release.apk

      - name: Commit APKs to repository root
        run: |
          set -euo pipefail
          # Copy each per-ABI APK to the repo root as elpa-flutter-demo-<abi>.apk.
          # flutter names them app-<abi>-release.apk (e.g. app-arm64-v8a-release.apk).
          for apk in "${GEN_DIR}"/build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(basename "$apk" | sed -E 's/^app-(.*)-release\.apk$/\1/')
            cp "$apk" "${GITHUB_WORKSPACE}/elpa-flutter-demo-${abi}.apk"
            git -C "${GITHUB_WORKSPACE}" add "elpa-flutter-demo-${abi}.apk"
          done
          git -C "${GITHUB_WORKSPACE}" config user.name "github-actions[bot]"
          git -C "${GITHUB_WORKSPACE}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git -C "${GITHUB_WORKSPACE}" diff --cached --quiet; then
            echo "APKs unchanged; nothing to commit."
          else
            git -C "${GITHUB_WORKSPACE}" commit -m "ci: build wgpu+Flutter template demo Android APKs (per ABI) [skip ci]"
            git -C "${GITHUB_WORKSPACE}" push origin HEAD:${{ github.ref_name }}
          fi
