name: Build bytecode assets

# The Flutter SDK demo (rust/examples/flutter) is authored in JavaScript but
# shipped to the deployed web example as **prebuilt VM bytecode** (the
# JS->AST->bytecode compiler phase runs at build time, not at app startup). This
# workflow keeps the committed `rust/examples/flutter/assets/demo.bc` in lock-step
# with the Flutter SDK / app JavaScript: whenever that JS (or the VM compiler)
# changes on a pushed branch, it recompiles the bytecode and commits the result
# back.
#
# The Pages workflow also regenerates the bytecode just before it builds, so a
# deploy is always fresh even if this commit-back has not run yet; this job exists
# so the checked-in asset a local build embeds never drifts.

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "rust/examples/flutter/assets/**.js"
      - "rust/examples/flutter/assets/sdk/**.js"
      - "rust/examples/flutter/src/**"
      - "rust/crates/elpian-vm/**"
      - ".github/workflows/build-bytecode.yml"
  workflow_dispatch:

permissions:
  contents: write # commits the regenerated bytecode back to the branch

concurrency:
  group: build-bytecode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bytecode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Compile the Flutter SDK demo to bytecode
        working-directory: rust
        run: cargo run -p elpa-flutter --bin build_bytecode

      - name: Commit regenerated bytecode
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/examples/flutter/assets/*.bc
          if git diff --cached --quiet; then
            echo "Bytecode unchanged; nothing to commit."
          else
            git commit -m "ci: rebuild Flutter demo bytecode [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
