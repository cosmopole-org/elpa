name: Deploy Flutter SDK demo to GitHub Pages

# Builds the wasm web example (rust/examples/web) carrying the **Flutter SDK demo**
# (rust/examples/flutter) with Trunk and publishes it to GitHub Pages on every
# push, so the latest commit is testable live at
#   https://<owner>.github.io/<repo>/
#
# The Flutter kit draws through the Vello scene path (`scene.submit`), which
# rasterizes on the GPU via wgpu **compute** — so the page requires a
# **WebGPU**-capable browser (Chrome/Edge, or Safari/Firefox with WebGPU enabled);
# there is no WebGL fallback for the scene path.
#
# One-time setup in the repo: Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". (No branch needs selecting; this workflow deploys.)

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

# Permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deployment; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      # Cache the example's wasm build (it is excluded from the workspace, so it
      # has its own target dir).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/examples/web -> target

      - name: Install Trunk
        run: cargo install --locked trunk

      # Compile the Flutter demo's JavaScript to VM bytecode *now*, at deploy time,
      # into rust/examples/flutter/assets/demo.bc. The web example embeds that
      # bytecode (include_bytes!) and loads it with Elpa::new_from_bytecode, so the
      # browser never runs the JS/AST front-end — the compiler phase has already
      # happened here in the build.
      - name: Compile the Flutter SDK demo to bytecode
        working-directory: rust
        run: cargo run -p elpa-flutter --bin build_bytecode

      # Build the web example with the Flutter SDK demo at the site root, with the
      # matching `--public-url` so its asset URLs resolve. The `flutter` feature
      # embeds the Flutter bytecode and installs the live Vello scene backend
      # (WebGPU) that rasterizes the kit's `scene.submit` ops. `--no-default-features`
      # drops the host wgpu so only Vello's own wgpu is linked: two wgpu versions
      # both emitting web-sys WebGPU bindings break wasm-bindgen with duplicate
      # string enums.
      - name: Build web example (Flutter SDK demo, site root)
        working-directory: rust/examples/web
        run: trunk build --release --no-default-features --features flutter --public-url "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rust/examples/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
