name: Deploy web example to GitHub Pages

# Builds the wasm web example (examples/web) with Trunk and publishes it to
# GitHub Pages on every push, so the latest commit is testable live at
#   https://<owner>.github.io/<repo>/
#
# One-time setup in the repo: Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". (No branch needs selecting; this workflow deploys.)

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

# Permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deployment; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      # Cache the example's wasm build (it is excluded from the workspace, so it
      # has its own target dir).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/web -> target

      - name: Install Trunk
        run: cargo install --locked trunk

      # Compile each app's JavaScript to VM bytecode *now*, at deploy time, into
      # examples/*/assets/*.bc. The web example embeds that bytecode
      # (include_bytes!) and loads it with Elpa::new_from_bytecode, so the browser
      # never runs the JS/AST front-end — the compiler phase has already happened
      # here in the build. All apps are compiled; the web crate embeds whichever
      # its feature selects.
      - name: Compile apps to bytecode
        run: |
          cargo run -p elpa-material --bin build_bytecode
          cargo run -p elpa-game3d --bin build_bytecode
          cargo run -p elpa-liquidglass --bin build_bytecode
          cargo run -p elpa-websdk --bin build_bytecode

      # Five apps share one Pages site: the Liquid Glass **calculator** at the
      # site root (`--features calculator`), the Liquid Glass UI kit demo under
      # `/glass/`, the Game3D engine demo under `/game3d/`, the Material gallery
      # under `/material/`, and the Web SDK showcase under `/websdk/`, each with
      # the matching `--public-url` so its asset URLs resolve. Build the root
      # first (it writes the default `dist/`), then the others into their own
      # subdirs; each subsequent build only manages its own dist, so they coexist
      # in one upload.
      - name: Build web example (Liquid Glass calculator, site root)
        working-directory: examples/web
        run: trunk build --release --features calculator --public-url "/${{ github.event.repository.name }}/"

      - name: Build web example (Liquid Glass UI kit, /glass/)
        working-directory: examples/web
        run: trunk build --release --features liquidglass --public-url "/${{ github.event.repository.name }}/glass/" --dist dist/glass

      - name: Build web example (Game3D, /game3d/)
        working-directory: examples/web
        run: trunk build --release --features game3d --public-url "/${{ github.event.repository.name }}/game3d/" --dist dist/game3d

      - name: Build web example (Material, /material/)
        working-directory: examples/web
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/material/" --dist dist/material

      - name: Build web example (Web SDK, /websdk/)
        working-directory: examples/web
        run: trunk build --release --features websdk --public-url "/${{ github.event.repository.name }}/websdk/" --dist dist/websdk

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
